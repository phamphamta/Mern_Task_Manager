services:
  # -------------------------------------
  # 1. BACKEND (Web Service)
  # -------------------------------------
  - type: web
    name: teamsync-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: SESSION_SECRET
        value: "teamsync_super_secret_session_key_2026"
      - key: SESSION_EXPIRES_IN
        value: "7d"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://teamsync-backend-8vm8.onrender.com/api/auth/google/callback
      - key: FRONTEND_ORIGIN
        value: https://teamsync-frontend-8vm8.onrender.com
      - key: FRONTEND_GOOGLE_CALLBACK_URL
        value: https://teamsync-frontend-8vm8.onrender.com/google/oauth/callback
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # -------------------------------------
  # 2. FRONTEND (Static Site)
  # -------------------------------------
  - type: web
    runtime: static
    name: teamsync-frontend
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        value: https://teamsync-backend-8vm8.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
